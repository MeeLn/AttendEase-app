name: attendease
description: AttendEase rebuilt as a Flutter application.
publish_to: 'none'
version: 1.0.0+1

hooks:
  user_defines:
    sqlite3:
      source: system

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  web:
    generate: true
  image_path: "assets/ic_launcher.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/login-bg.png
    - assets/admin-logo.png
    - assets/ic_launcher.png
